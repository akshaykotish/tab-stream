plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.akshaykotish.tabstreamlauncher'
    compileSdk 35

    defaultConfig {
        applicationId "com.akshaykotish.tabstreamlauncher"
        minSdk 21
        targetSdk 35
        versionCode 2
        versionName "1.1"
    }

    // Sign with v1 (JAR) + v2 + v3 so every device's installer accepts the APK.
    signingConfigs {
        debug {
            enableV1Signing true
            enableV2Signing true
            enableV3Signing true
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
}
