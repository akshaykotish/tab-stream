<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1220"/>
      <stop offset="1" stop-color="#070A11"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3D7BFF"/>
      <stop offset="1" stop-color="#2F6BFF"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- subtle grid dots -->
  <g fill="#1b2540" opacity="0.5">
    <circle cx="1040" cy="90" r="3"/><circle cx="1100" cy="90" r="3"/><circle cx="1160" cy="90" r="3"/>
    <circle cx="1040" cy="150" r="3"/><circle cx="1100" cy="150" r="3"/><circle cx="1160" cy="150" r="3"/>
    <circle cx="60" cy="540" r="3"/><circle cx="120" cy="540" r="3"/><circle cx="180" cy="540" r="3"/>
  </g>

  <!-- Icon: monitor + play, with broadcast waves -->
  <g transform="translate(150 250)" filter="url(#glow)">
    <!-- broadcast waves -->
    <g fill="none" stroke="#2F6BFF" stroke-linecap="round" opacity="0.85">
      <path d="M 196 -60 A 86 86 0 0 1 196 100" stroke-width="9" opacity="0.5"/>
      <path d="M 220 -86 A 120 120 0 0 1 220 126" stroke-width="9" opacity="0.28"/>
    </g>
    <!-- monitor body -->
    <rect x="-150" y="-100" width="300" height="200" rx="22" fill="url(#blue)"/>
    <rect x="-128" y="-78" width="256" height="148" rx="10" fill="#0A0E18"/>
    <!-- play triangle -->
    <path d="M -28 -34 L 52 4 L -28 42 Z" fill="#FFFFFF"/>
    <!-- stand -->
    <rect x="-26" y="112" width="52" height="16" rx="6" fill="url(#blue)"/>
    <rect x="-70" y="140" width="140" height="16" rx="8" fill="url(#blue)"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Helvetica, Arial, sans-serif">
    <text x="430" y="280" font-size="118" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Tab Stream</text>
    <text x="436" y="330" font-size="27" font-weight="400" fill="#7C8BA6" letter-spacing="2">REAL-TIME SCREEN STREAMING · WEBRTC</text>

    <!-- divider -->
    <rect x="434" y="372" width="470" height="2" fill="#1E2A44"/>

    <!-- branding message -->
    <text x="434" y="430" font-size="40" font-weight="600" fill="#3D7BFF">An Akshay Kotish &amp; Co. app</text>
  </g>
</svg>
