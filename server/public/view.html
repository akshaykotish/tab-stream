<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tab-stream · Watch</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: #000; color: #e6e9ef;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { height: 100%; display: flex; flex-direction: column; }
    .bar { padding: 8px 14px; display: flex; align-items: center; gap: 10px;
      background: #0b0e14; border-bottom: 1px solid #1c2230; }
    .bar h1 { font-size: 14px; margin: 0; font-weight: 600; }
    .pill { font-size: 12px; padding: 3px 9px; border-radius: 999px; background: #1c2230; color: #9aa3b2; }
    .pill.live { background: #2a1316; color: #ff6b6b; }
    .pill.live::before { content: "●"; margin-right: 5px; color: #ff3b3b; }
    .spacer { flex: 1; }
    /* Bare mode (used by the Android launcher): stream only, zero chrome. */
    body.bare .bar { display: none; }
    body.bare .overlay { background: #000; }
    button { font: inherit; font-size: 13px; padding: 7px 13px; border-radius: 8px;
      border: 1px solid #2a3242; background: #151b27; color: #e6e9ef; cursor: pointer; }
    .stage { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      text-align: center; color: #7b8494; font-size: 15px; padding: 24px; pointer-events: none; }
    .overlay.hidden { display: none; }
    .tapToPlay { pointer-events: auto; cursor: pointer; background: #151b27cc;
      border: 1px solid #2a3242; padding: 14px 22px; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <h1>tab-stream</h1>
      <span id="status" class="pill">connecting…</span>
      <div class="spacer"></div>
      <button id="fs">Fullscreen</button>
    </div>
    <div class="stage">
      <video id="video" autoplay playsinline></video>
      <div id="overlay" class="overlay">Waiting for the broadcaster to go live…</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const ROOM = params.get('room') || 'main';
    if (params.has('bare')) document.body.classList.add('bare'); // launcher: stream only
    const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const statusEl = document.getElementById('status');
    document.getElementById('fs').onclick = () => {
      if (document.fullscreenElement) document.exitFullscreen();
      else document.querySelector('.stage').requestFullscreen?.();
    };

    function setStatus(text, live) {
      statusEl.textContent = text;
      statusEl.className = 'pill' + (live ? ' live' : '');
    }
    function showOverlay(html) {
      if (html === null) { overlay.classList.add('hidden'); return; }
      overlay.classList.remove('hidden'); overlay.innerHTML = html;
    }

    const BARE = document.body.classList.contains('bare');

    // If we want sound but the element is muted, keep trying to restore audio for a few seconds.
    let unmuteTimer = null;
    function scheduleUnmute() {
      let n = 0;
      clearInterval(unmuteTimer);
      unmuteTimer = setInterval(() => {
        if (!audioEnabled || !video.muted) { clearInterval(unmuteTimer); return; }
        video.muted = false;
        video.play().catch(() => {});
        if (++n > 8) clearInterval(unmuteTimer);
      }, 1200);
    }

    // Always auto-play, WITH sound when audio is enabled. Only fall back to muted as a last
    // resort (and then keep trying to un-mute), so the app plays audio reliably.
    function tryPlay() {
      video.muted = !audioEnabled;
      video.play().then(() => {
        if (audioEnabled && video.muted) { video.muted = false; video.play().catch(() => {}); }
      }).catch((err) => {
        if (BARE) {
          if (err && err.name === 'NotAllowedError') {
            // Autoplay-with-sound blocked: show video muted, then keep trying to restore audio.
            video.muted = true;
            video.play().catch(() => setTimeout(tryPlay, 800));
            if (audioEnabled) scheduleUnmute();
          } else {
            // Transient error (e.g. load interrupted) — retry WITH sound, don't mute.
            setTimeout(tryPlay, 600);
          }
        } else {
          showOverlay('<div class="tapToPlay">▶ Tap to play</div>');
          overlay.querySelector('.tapToPlay').onclick = () => {
            video.muted = !audioEnabled; video.play().then(() => showOverlay(null));
          };
        }
      });
    }

    let ws, pc;

    // The playout buffer exists ONLY to lip-sync audio with video. So:
    //  - audio ON  -> small 120ms buffer on both tracks (kept in sync)
    //  - audio OFF -> zero buffer (nothing to sync) = lowest possible latency
    function playoutMs() { return audioEnabled ? 80 : 0; }
    function tuneReceivers() {
      if (!pc) return;
      const ms = playoutMs();
      for (const r of pc.getReceivers()) {
        try { r.jitterBufferTarget = ms; } catch {}
        try { r.playoutDelayHint = ms / 1000; } catch {}
      }
    }
    let bufferTimer = null;
    function pinReceivers() {
      let n = 0;
      clearInterval(bufferTimer);
      bufferTimer = setInterval(() => { tuneReceivers(); if (++n > 12) clearInterval(bufferTimer); }, 1000);
    }

    // ---------------- File mode: pre-buffer, then smooth full-quality playback ----------------
    let mode = 'live';            // 'live' (WebRTC) | 'file' (buffered HTTP)
    let audioEnabled = true;      // mirrors the dashboard audio toggle
    let bufferPoll = null;

    function stopLive() {
      if (pc) { try { pc.close(); } catch {} pc = null; }
      video.srcObject = null;
    }

    function bufferedAhead() {
      const b = video.buffered, t = video.currentTime;
      for (let i = 0; i < b.length; i++) if (b.start(i) <= t + 0.25 && b.end(i) > t) return b.end(i) - t;
      return b.length ? Math.max(0, b.end(b.length - 1) - t) : 0;
    }

    function playFileMode(url, name, bufferSeconds) {
      mode = 'file';
      stopLive();
      clearInterval(bufferPoll);
      setStatus('FILE', true);
      video.srcObject = null;
      video.src = url;
      video.preload = 'auto';
      video.muted = !audioEnabled;
      video.load();

      const target = Math.max(1, bufferSeconds || 15);
      let started = false;
      showOverlay('Buffering 0%' + (name ? ' · ' + name : ''));

      const gate = () => {
        if (mode !== 'file') return;
        const dur = isFinite(video.duration) ? video.duration : target;
        const goal = Math.min(target, Math.max(1, dur - video.currentTime));
        const ahead = bufferedAhead();
        // Start once we have the requested seconds buffered, or the browser says it can play through.
        const enough = ahead >= goal || (video.readyState >= 4 && ahead >= Math.min(goal, 3));
        if (!started) {
          showOverlay('Buffering ' + Math.min(100, Math.round(ahead / goal * 100)) + '%' + (name ? ' · ' + name : ''));
          if (enough) {
            started = true; showOverlay(null);
            tryPlay(); // robust play: keeps sound on when audio is enabled
          }
        }
      };
      bufferPoll = setInterval(gate, 300);

      video.onwaiting = () => { if (mode === 'file') { started = false; showOverlay('Re‑buffering…'); } };
      video.onplaying = () => { if (mode === 'file') showOverlay(null); };
      video.onerror   = () => { if (mode === 'file') showOverlay('Could not play this file.'); };
    }

    function goLiveMode() {
      mode = 'live';
      clearInterval(bufferPoll);
      try { video.pause(); } catch {}
      video.removeAttribute('src');
      video.srcObject = null;
      video.load();
      setStatus('waiting for stream…');
      showOverlay('Waiting for the broadcaster to go live…');
    }

    function newPeer() {
      pc = new RTCPeerConnection(ICE);
      pc.ontrack = (e) => {
        mode = 'live';
        clearInterval(bufferPoll);
        video.removeAttribute('src');
        video.srcObject = e.streams[0];
        tuneReceivers();
        pinReceivers();
        showOverlay(null);
        setStatus('LIVE', true);
        tryPlay();
      };
      pc.onicecandidate = (e) => {
        if (!e.candidate) return;
        if (e.candidate.protocol === 'tcp') return; // UDP only — lowest latency
        ws.send(JSON.stringify({ type: 'ice', candidate: e.candidate, room: ROOM }));
      };
      pc.onconnectionstatechange = () => {
        if (['failed', 'disconnected'].includes(pc.connectionState)) setStatus('reconnecting…');
      };
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);
      ws.onopen = () => ws.send(JSON.stringify({ type: 'viewer', room: ROOM }));
      ws.onmessage = async (e) => {
        const msg = JSON.parse(e.data);
        switch (msg.type) {
          case 'broadcaster-online':
            if (mode === 'live') { setStatus('waiting for stream…'); showOverlay('Connecting to the stream…'); }
            break;
          case 'broadcaster-offline':
            if (mode === 'live') {
              setStatus('offline'); showOverlay('Waiting for the broadcaster to go live…');
              video.srcObject = null;
            }
            break;
          case 'file':
            playFileMode(location.origin + msg.url, msg.name, msg.bufferSeconds);
            break;
          case 'live':
            goLiveMode();
            break;
          case 'offer': {
            newPeer();
            await pc.setRemoteDescription(msg.sdp);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            ws.send(JSON.stringify({ type: 'answer', sdp: pc.localDescription, room: ROOM }));
            break;
          }
          case 'ice':
            if (pc && msg.candidate) { try { await pc.addIceCandidate(msg.candidate); } catch {} }
            break;
          case 'audio':
            // Dashboard toggled audio for this output device (applies to live and file modes).
            audioEnabled = msg.enabled;
            video.muted = !msg.enabled;
            if (msg.enabled) { try { video.volume = 1; await video.play(); } catch {} scheduleUnmute(); }
            // Re-tune the live buffer: audio on -> 120ms (synced), audio off -> 0ms (lowest latency).
            if (mode === 'live') { tuneReceivers(); pinReceivers(); }
            break;
        }
      };
      ws.onclose = () => { setStatus('reconnecting…'); setTimeout(connect, 1000); };
    }

    connect();
  </script>
</body>
</html>
